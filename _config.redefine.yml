# ============================================================
# Redefine Theme Configuration v2
# ============================================================

info:
  title: "Gulzxeric's Blog"
  # subtitle: "Welcome to my blog"
  author: "Gulzxeric"
  url: https://gulzxeric.github.io

defaults:
  favicon: /assets/cat-favicon.svg
  logo:
  avatar: /assets/cat-avatar.svg

colors:
  primary: "#A31F34"
  secondary:
  default_mode: light

global:
  fonts:
    chinese:
      enable: false
      family:
      url:
    english:
      enable: false
      family:
      url:
    title:
      enable: false
      family:
      url:
  content_max_width: 1000px
  sidebar_width: 210px
  hover:
    shadow: true
    scale: false
  scroll_progress:
    bar: false
    percentage: true
  website_counter:
    url: https://cn.vercount.one/js
    enable: true
    site_pv: true
    site_uv: true
    post_pv: true
  single_page: true
  preloader:
    enable: true
    custom_message:
  side_tools:
    gear_rotation: true
    auto_expand: false
  open_graph:
    enable: true
    image: /images/redefine-og.webp
    description: Hexo Theme Redefine, Redefine Your Hexo Journey.
  google_analytics:
    enable: false
    id:

fontawesome:
  thin: false
  light: false
  duotone: false
  sharp_solid: false

home_banner:
  enable: true
  style: fixed
  image:
    light: /images/wallhaven-wqery6-light.webp
    dark: /images/wallhaven-wqery6-dark.webp
  title: "Eric's Blog"
  subtitle:
    text: []
    hitokoto:
      enable: false
      show_author: false
      api: https://v1.hitokoto.cn
    typing_speed: 100
    backing_speed: 80
    starting_delay: 500
    backing_delay: 1500
    loop: true
    smart_backspace: true
  text_color:
    light: "#fff"
    dark: "#d1d1b6"
  text_style:
    title_size: 2.8rem
    subtitle_size: 1.5rem
    line_height: 1.2
  custom_font:
    enable: false
    family:
    url:
  social_links:
    enable: false
    style: default
    links:
    qrs:

navbar:
  auto_hide: false
  color:
    left: "#f78736"
    right: "#367df7"
    transparency: 35
  width:
    home: 1200px
    pages: 1000px
  links:
    Home:
      path: none
    友链:
      path: /friends
      icon: fa-regular fa-user-group
    归档:
      path: /archives
      icon: fa-regular fa-archive
    分类:
      path: /categories
      icon: fa-regular fa-folder
    标签:
      path: /tags
      icon: fa-regular fa-tags
    关于:
      path: /about
      icon: fa-regular fa-user
  search:
    enable: true
    preload: true

home:
  sidebar:
    enable: true
    position: left
    first_item: menu
    announcement:
    show_on_mobile: true
    links:
  article_date_format: auto
  excerpt_length: 200
  categories:
    enable: true
    limit: 3
  tags:
    enable: true
    limit: 3

articles:
  style:
    font_size: 16px
    line_height: 1.5
    image_border_radius: 14px
    image_alignment: center
    image_caption: false
    link_icon: true
    delete_mask: false
    title_alignment: left
    headings_top_spacing:
      h1: 3.2rem
      h2: 2.4rem
      h3: 1.9rem
      h4: 1.6rem
      h5: 1.4rem
      h6: 1.3rem
  word_count:
    enable: true
    count: true
    min2read: true
  author_label:
    enable: false
    auto: false
    list: []
  code_block:
    copy: true
    style: mac
    highlight_theme:
      light: github
      dark: vs2015
    font:
      enable: false
      family:
      url:
  toc:
    enable: true
    max_depth: 3
    number: false
    expand: true
    init_open: true
  copyright:
    enable: true
    default: cc_by_nc_sa
  lazyload: true
  pangu_js: false
  recommendation:
    enable: false
    title: 推荐阅读
    limit: 3
    mobile_limit: 2
    placeholder: /images/wallhaven-wqery6-light.webp
    skip_dirs: []

comment:
  enable: true
  system: giscus
  config:
    giscus:
      repo: gulzxeric/gulzxeric.github.io
      repo_id: R_kgDOSo2y2w
      category: Announcements
      category_id: DIC_kwDOSo2y284C9_ol
      mapping: pathname
      strict: 0
      reactions_enabled: 1
      emit_metadata: 0
      lang: zh-CN
      input_position: bottom
      loading: lazy
    artalk:
      server:
      site:
    utterances:
      repo:
      issue_term: pathname
      issue_number:
      label:
      theme_light: github-light
      theme_dark: github-dark

footer:
  runtime: true
  icon: '<span class="footer-cat-icon">🐱</span>'
  start: 2026/05/27 10:00:00
  statistics: true
  customize: "Powered by Hexo & Redefine"
  icp:
    enable: false
    number:
    url:

inject:
  enable: true
  head:
    - |
      <style>
      .footer-runtime,.footer-statistics{font-size:13px!important;line-height:1.6!important}
      </style>
    - |
      <style>
      .footer-cat-icon{display:inline-block;animation:catSway 0.6s ease-in-out infinite alternate;transform-origin:50% 60%}
      @keyframes catSway{0%{transform:rotate(-20deg)}100%{transform:rotate(20deg)}}
      </style>
  footer:

plugins:
  feed:
    enable: false
  aplayer:
    enable: false
    type: fixed
    audios:
  mermaid:
    enable: false
    version: "11.4.1"
    theme:
      light: "default"
      dark: "dark"

page_templates:
  friends_column: 2
  tags_style: blur
  masonry:
    batch_size: 12
    initial_batch_size: 24

cdn:
  enable: false
  provider: npmmirror
  custom_url:
links:
  - links_category: 我的朋友们
    has_thumbnail: false
    list:
      - name: muelsyse
        link: https://muelsyse.hk/
        description: muelsyse
        avatar: /friends/assets/muelsyse.png
      - name: Linyl
        link: https://ly1tnt.github.io/
        description: lyl
        avatar: /friends/assets/lyl.png

developer:
  enable: false
